name: Product governance quality

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  product-governance-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run product governance quality loop
        run: npm run check
